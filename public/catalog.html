<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — EventGate</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header"></div>

  <section class="section catalog-page">
    <div class="container">
      <div class="catalog-top">
        <h1 class="section-title">Каталог подій</h1>
        <button type="button" class="btn btn-outline btn-sm catalog-filters-toggle" id="filtersToggle">Фільтри</button>
      </div>

      <div class="catalog-layout">
        <aside class="catalog-sidebar" id="catalogSidebar">
          <div class="sidebar-sticky">
            <div class="sidebar-head">
              <strong>Підбір подій</strong>
              <button type="button" class="link-btn" id="resetFilters">Очистити</button>
            </div>

            <div class="filter-block">
              <div class="filter-block-title">Тип</div>
              <div class="chip-list" id="typeChips"></div>
              <select id="type" class="visually-hidden" aria-hidden="true"><option value="">Усі</option></select>
            </div>

            <div class="filter-block">
              <div class="filter-block-title">Настрій</div>
              <div class="chip-list" id="moodChips"></div>
              <select id="mood" class="visually-hidden" aria-hidden="true"><option value="">Усі</option></select>
            </div>

            <div class="filter-block">
              <div class="filter-block-title">Місто</div>
              <div class="chip-list chip-list-scroll" id="cityChips"></div>
              <select id="city" class="visually-hidden" aria-hidden="true"><option value="">Усі</option></select>
            </div>

            <div class="filter-block">
              <div class="filter-block-title">Майданчик</div>
              <select id="venue" class="filter-select"><option value="">Будь-який</option></select>
            </div>

            <div class="filter-block">
              <div class="filter-block-title">Ціна, ₴</div>
              <div class="price-range">
                <input type="number" id="price_min" min="0" placeholder="мін">
                <span class="price-dash">—</span>
                <input type="number" id="price_max" min="0" placeholder="макс">
              </div>
            </div>

            <div class="filter-block">
              <div class="filter-block-title">Період</div>
              <div class="date-range">
                <input type="date" id="date_from" title="Дата від">
                <input type="date" id="date_to" title="Дата до">
              </div>
              <div class="date-presets">
                <button type="button" class="preset-btn" data-range="week">7 днів</button>
                <button type="button" class="preset-btn" data-range="month">Місяць</button>
              </div>
            </div>

            <label class="toggle-row">
              <input type="checkbox" id="has_seats">
              <span class="toggle-ui"></span>
              <span>Лише з вільними місцями</span>
            </label>
          </div>
        </aside>

        <div class="catalog-content">
          <div class="search-bar">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input type="search" id="search" placeholder="Шукати за назвою, містом, майданчиком...">
            <button type="button" class="search-clear" id="clearSearch" title="Очистити">×</button>
          </div>

          <div id="activeFilters" class="active-tags hidden"></div>

          <div class="results-toolbar">
            <span id="count" class="results-count">Завантаження...</span>
            <div class="toolbar-right">
              <select id="sort" class="sort-select">
                <option value="date_asc">Найближчі</option>
                <option value="date_desc">Пізніші</option>
                <option value="price_asc">Дешевші</option>
                <option value="price_desc">Дорожчі</option>
                <option value="seats">Більше місць</option>
                <option value="title">А → Я</option>
              </select>
              <div class="view-toggle">
                <button class="btn btn-sm btn-outline active" id="viewGrid" title="Сітка">▦</button>
                <button class="btn btn-sm btn-outline" id="viewList" title="Список">☰</button>
                <button class="btn btn-sm btn-outline" id="viewTable" title="Таблиця">≡</button>
              </div>
            </div>
          </div>

          <div id="events" class="grid"></div>
        </div>
      </div>
    </div>
  </section>

  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <footer class="footer">EventGate © 2026</footer>
  <script src="/js/api.js"></script>
  <script>
    let viewMode = 'grid';
    let debounce;
    let filterMeta = {};

    function chipHtml(value, label, active) {
      return `<button type="button" class="chip ${active ? 'active' : ''}" data-value="${value}">${label}</button>`;
    }

    function bindChipList(containerId, selectId, items, onChange) {
      const container = document.getElementById(containerId);
      const select = document.getElementById(selectId);
      const render = () => {
        const current = select.value;
        const all = [{ value: '', label: 'Усі' }, ...items];
        container.innerHTML = all.map(i => chipHtml(i.value, i.label, i.value === current)).join('');
        container.querySelectorAll('.chip').forEach(btn => {
          btn.onclick = () => {
            select.value = btn.dataset.value;
            render();
            onChange();
          };
        });
      };
      render();
      return render;
    }

    let refreshTypeChips, refreshMoodChips, refreshCityChips;

    async function loadFilters() {
      filterMeta = await api('/events/meta/filters');

      document.getElementById('type').innerHTML = '<option value="">Усі</option>' +
        filterMeta.types.map(t => `<option value="${t.id}">${t.label}</option>`).join('');
      document.getElementById('city').innerHTML = '<option value="">Усі</option>' +
        filterMeta.cities.map(c => `<option value="${c}">${c}</option>`).join('');
      document.getElementById('venue').innerHTML = '<option value="">Будь-який</option>' +
        (filterMeta.venues || []).map(v => `<option value="${v}">${v}</option>`).join('');
      document.getElementById('mood').innerHTML = '<option value="">Усі</option>' +
        filterMeta.moods.map(m => `<option value="${m.id}">${m.label}</option>`).join('');

      if (filterMeta.price_min != null) {
        document.getElementById('price_min').placeholder = String(filterMeta.price_min);
        document.getElementById('price_max').placeholder = String(filterMeta.price_max);
      }

      refreshTypeChips = bindChipList('typeChips', 'type',
        filterMeta.types.map(t => ({ value: t.id, label: t.label })), load);
      refreshMoodChips = bindChipList('moodChips', 'mood',
        filterMeta.moods.map(m => ({ value: m.id, label: m.label })), load);
      refreshCityChips = bindChipList('cityChips', 'city',
        filterMeta.cities.map(c => ({ value: c, label: c })), load);
    }

    function getFilterValues() {
      return {
        sort: document.getElementById('sort').value,
        search: document.getElementById('search').value.trim(),
        type: document.getElementById('type').value,
        city: document.getElementById('city').value,
        venue: document.getElementById('venue').value,
        mood: document.getElementById('mood').value,
        price_min: document.getElementById('price_min').value,
        price_max: document.getElementById('price_max').value,
        date_from: document.getElementById('date_from').value,
        date_to: document.getElementById('date_to').value,
        has_seats: document.getElementById('has_seats').checked ? '1' : '',
      };
    }

    function renderActiveFilters() {
      const v = getFilterValues();
      const chips = [];
      if (v.search) chips.push({ label: `«${v.search}»`, clear: () => { document.getElementById('search').value = ''; } });
      if (v.type) chips.push({ label: filterMeta.types?.find(t => t.id === v.type)?.label || v.type, clear: () => { document.getElementById('type').value = ''; refreshTypeChips(); } });
      if (v.mood) chips.push({ label: filterMeta.moods?.find(m => m.id === v.mood)?.label || v.mood, clear: () => { document.getElementById('mood').value = ''; refreshMoodChips(); } });
      if (v.city) chips.push({ label: v.city, clear: () => { document.getElementById('city').value = ''; refreshCityChips(); } });
      if (v.venue) chips.push({ label: v.venue, clear: () => { document.getElementById('venue').value = ''; } });
      if (v.price_min) chips.push({ label: `від ${v.price_min} ₴`, clear: () => { document.getElementById('price_min').value = ''; } });
      if (v.price_max) chips.push({ label: `до ${v.price_max} ₴`, clear: () => { document.getElementById('price_max').value = ''; } });
      if (v.date_from) chips.push({ label: `з ${v.date_from}`, clear: () => { document.getElementById('date_from').value = ''; } });
      if (v.date_to) chips.push({ label: `до ${v.date_to}`, clear: () => { document.getElementById('date_to').value = ''; } });
      if (v.has_seats) chips.push({ label: 'Є місця', clear: () => { document.getElementById('has_seats').checked = false; } });

      const el = document.getElementById('activeFilters');
      if (!chips.length) { el.classList.add('hidden'); el.innerHTML = ''; return; }
      el.classList.remove('hidden');
      el.innerHTML = chips.map((c, i) => `<button type="button" class="tag" data-i="${i}">${c.label} ×</button>`).join('');
      el.querySelectorAll('.tag').forEach(btn => {
        btn.onclick = () => { chips[Number(btn.dataset.i)].clear(); load(); };
      });
    }

    function cardHtml(e) {
      return `
        <a href="/event.html?id=${e.id}" class="event-card" style="text-decoration:none;color:inherit">
          ${eventImg(e)}
          <div class="event-card-body">
            ${typeBadge(e.event_type)} ${moodBadge(e.mood)}
            <h3>${e.title}</h3>
            <p class="meta">${e.city || ''} · ${e.venue}<br>${formatDate(e.event_date)}</p>
            <p class="price">від ${formatPrice(e.min_price || 0)} · ${e.free_seats || 0} вільних</p>
          </div>
        </a>`;
    }

    async function load() {
      const v = getFilterValues();
      const params = new URLSearchParams({ sort: v.sort, view: viewMode });
      Object.entries(v).forEach(([k, val]) => { if (val && k !== 'sort') params.set(k, val); });

      const { events } = await api('/events?' + params);
      const container = document.getElementById('events');
      document.getElementById('count').textContent = events.length
        ? `${events.length} ${events.length === 1 ? 'подія' : events.length < 5 ? 'події' : 'подій'}`
        : 'Нічого не знайдено';
      renderActiveFilters();

      if (!events.length) {
        container.className = '';
        container.innerHTML = '<div class="empty-results"><p>За цими умовами подій немає</p><button type="button" class="btn btn-outline btn-sm" onclick="resetAll()">Скинути фільтри</button></div>';
        return;
      }

      if (viewMode === 'table') {
        container.className = 'table-wrap';
        container.innerHTML = `<table class="events-table">
          <tr><th>Назва</th><th>Тип</th><th>Місто</th><th>Майданчик</th><th>Дата</th><th>Ціна від</th><th>Вільно</th></tr>
          ${events.map(e => `<tr>
            <td><a href="/event.html?id=${e.id}">${e.title}</a></td>
            <td>${typeBadge(e.event_type)}</td>
            <td>${e.city || '—'}</td>
            <td>${e.venue || '—'}</td>
            <td>${formatDate(e.event_date)}</td>
            <td>${formatPrice(e.min_price || 0)}</td>
            <td>${e.free_seats || 0}</td>
          </tr>`).join('')}
        </table>`;
      } else {
        container.className = viewMode === 'list' ? 'grid grid-list' : 'grid';
        container.innerHTML = events.map(cardHtml).join('');
      }
    }

    function resetAll() {
      document.getElementById('search').value = '';
      ['type','city','venue','mood','price_min','price_max','date_from','date_to'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('has_seats').checked = false;
      document.getElementById('sort').value = 'date_asc';
      refreshTypeChips?.();
      refreshMoodChips?.();
      refreshCityChips?.();
      load();
    }

    function setView(mode, btn) {
      viewMode = mode;
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      load();
    }

    function applyQuickDate(range) {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      document.getElementById('date_from').value = fmt(now);
      if (range === 'week') {
        const end = new Date(now);
        end.setDate(end.getDate() + 7);
        document.getElementById('date_to').value = fmt(end);
      } else {
        const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        document.getElementById('date_to').value = fmt(end);
      }
      load();
    }

    function closeSidebar() {
      document.getElementById('catalogSidebar').classList.remove('open');
      document.getElementById('sidebarBackdrop').classList.remove('show');
    }

    document.getElementById('viewGrid').onclick = (e) => setView('grid', e.target);
    document.getElementById('viewList').onclick = (e) => setView('list', e.target);
    document.getElementById('viewTable').onclick = (e) => setView('table', e.target);
    document.getElementById('resetFilters').onclick = resetAll;
    document.getElementById('clearSearch').onclick = () => { document.getElementById('search').value = ''; load(); };

    document.getElementById('filtersToggle').onclick = () => {
      document.getElementById('catalogSidebar').classList.toggle('open');
      document.getElementById('sidebarBackdrop').classList.toggle('show');
    };
    document.getElementById('sidebarBackdrop').onclick = closeSidebar;

    document.querySelectorAll('.catalog-sidebar input, .catalog-sidebar select, #sort, #has_seats').forEach(el => {
      el.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(load, 300); });
      el.addEventListener('change', load);
    });
    document.getElementById('search').addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(load, 350);
    });

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.onclick = () => applyQuickDate(btn.dataset.range);
    });

    const urlParams = new URLSearchParams(location.search);
    loadFilters().then(() => {
      if (urlParams.get('mood')) document.getElementById('mood').value = urlParams.get('mood');
      if (urlParams.get('type')) document.getElementById('type').value = urlParams.get('type');
      if (urlParams.get('city')) document.getElementById('city').value = urlParams.get('city');
      if (urlParams.get('search')) document.getElementById('search').value = urlParams.get('search');
      refreshTypeChips?.();
      refreshMoodChips?.();
      refreshCityChips?.();
      load();
    });
  </script>
</body>
</html>
