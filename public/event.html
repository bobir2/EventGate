<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подія — EventGate</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header"></div>
  <section class="section">
    <div class="container" id="content"><p>Завантаження...</p></div>
  </section>
  <footer class="footer">EventGate © 2026</footer>
  <script src="/js/api.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get('id');
    const selectedSeats = new Map();
    let previewMode = false;
    let eventData = null;
    let seatsData = [];
    let activeSector = 'all';
    let isFavorite = false;

    async function fetchData() {
      eventData = await api('/events/' + id);
      const res = await api('/events/' + id + '/seats');
      seatsData = res.seats;
      isFavorite = !!eventData.isFavorite;
      selectedSeats.forEach((seat, sid) => {
        const fresh = seatsData.find(s => String(s.id) === String(sid));
        if (!fresh || fresh.status !== 'free') selectedSeats.delete(sid);
      });
    }

    function totalSelected() {
      return [...selectedSeats.values()].reduce((s, x) => s + Number(x.price), 0);
    }

    function render() {
      const bySector = {};
      seatsData.forEach(s => {
        if (activeSector !== 'all' && String(s.sector_id) !== activeSector) return;
        if (!bySector[s.sector_id]) bySector[s.sector_id] = { name: s.sector_name, price: s.price, id: s.sector_id, seats: [] };
        bySector[s.sector_id].seats.push(s);
      });

      const count = selectedSeats.size;

      document.getElementById('content').innerHTML = `
        <div class="event-layout">
          <div>
            ${eventImg(eventData, 'event-hero-img')}
            ${typeBadge(eventData.event_type)} ${moodBadge(eventData.mood)}
            <h1 style="margin:12px 0">${eventData.title}</h1>
            <p class="meta">${eventData.city}, ${eventData.venue}</p>
            <p class="meta">${formatDate(eventData.event_date)}</p>
            <p style="margin-top:14px;line-height:1.65;font-size:.95rem">${eventData.description || ''}</p>
            <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-outline btn-sm" id="previewBtn">${previewMode ? 'Режим покупки' : 'Перегляд місця'}</button>
              ${getToken() ? `<button class="btn btn-outline btn-sm" id="favBtn">${isFavorite ? 'В обраному' : 'В обране'}</button>` : ''}
              <a href="/evening.html?add=${id}" class="btn btn-outline btn-sm">+ До маршруту вечора</a>
            </div>
          </div>
          <div>
            <h3>Вибір місць</h3>
            <p class="meta" style="margin-bottom:10px">Клікніть на вільні місця — можна обрати кілька</p>
            <div class="pills" id="sectorPills"></div>
            <div class="stage">СЦЕНА / ЕКРАН</div>
            <div class="seat-map" id="seatMap"></div>
            <div class="seat-legend" style="display:flex;gap:14px;margin:10px 0;font-size:.78rem;color:var(--muted)">
              <span><span class="legend-dot free"></span> Вільне</span>
              <span><span class="legend-dot reserved"></span> Резерв</span>
              <span><span class="legend-dot sold"></span> Зайняте</span>
              <span><span class="legend-dot selected"></span> Обране</span>
            </div>
            <div id="seatInfo" class="selected-seats-panel ${count ? '' : 'hidden'}"></div>
            <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-primary" id="addCartBtn" disabled>
                ${count ? `Додати ${count} ${count === 1 ? 'місце' : count < 5 ? 'місця' : 'місць'} в кошик` : 'Додати в кошик'}
              </button>
              <button class="btn btn-outline" id="clearBtn" ${count ? '' : 'disabled'}>Скинути</button>
              <a href="/cart.html" class="btn btn-outline">Кошик</a>
            </div>
          </div>
        </div>
        <h3 style="margin-top:32px">Сектори та ціни</h3>
        <div class="grid" style="margin-top:12px">
          ${eventData.sectors.map(s => `
            <div class="stat-card" style="cursor:pointer" data-sector="${s.id}">
              <div class="value">${formatPrice(s.price)}</div>
              <div class="label">${s.name} · ${s.free_count} вільних</div>
            </div>
          `).join('')}
        </div>`;

      document.getElementById('sectorPills').innerHTML =
        `<span class="pill ${activeSector==='all'?'active':''}" data-s="all">Усі</span>` +
        eventData.sectors.map(s => `<span class="pill ${activeSector==String(s.id)?'active':''}" data-s="${s.id}">${s.name}</span>`).join('');

      document.querySelectorAll('.pill').forEach(p => {
        p.onclick = () => { activeSector = p.dataset.s; render(); };
      });
      document.querySelectorAll('[data-sector]').forEach(c => {
        c.onclick = () => { activeSector = c.dataset.sector; render(); };
      });

      document.getElementById('previewBtn').onclick = () => {
        previewMode = !previewMode;
        if (previewMode) selectedSeats.clear();
        render();
      };
      document.getElementById('favBtn')?.addEventListener('click', toggleFavorite);
      document.getElementById('addCartBtn').onclick = addToCart;
      document.getElementById('clearBtn').onclick = () => { selectedSeats.clear(); render(); };

      updateSeatInfo();
      bindSeatMap(bySector);
    }

    function bindSeatMap(bySector) {
      const map = document.getElementById('seatMap');
      if (!map) return;
      map.innerHTML = Object.values(bySector).map(sec => `
        <div class="sector-block">
          <h4>${sec.name} — ${formatPrice(sec.price)}</h4>
          ${groupByRow(sec.seats).map(([row, rowSeats]) => `
            <div class="seats-row">
              <span class="row-label">${row}</span>
              ${rowSeats.map(s => {
                const sel = selectedSeats.has(String(s.id));
                const cls = s.status !== 'free' ? s.status : (sel ? (previewMode ? 'preview' : 'selected') : 'free');
                return `<button class="seat ${cls}" data-id="${s.id}" data-row="${s.row_num}" data-seat="${s.seat_num}"
                  data-sector="${sec.name}" data-price="${sec.price}"
                  ${s.status !== 'free' ? 'disabled' : ''}>${s.seat_num}</button>`;
              }).join('')}
            </div>`).join('')}
        </div>`).join('');

      map.querySelectorAll('.seat.free, .seat.selected, .seat.preview').forEach(btn => {
        if (!btn.disabled) btn.onclick = () => toggleSeat(btn);
      });
    }

    function groupByRow(seats) {
      const rows = {};
      seats.forEach(s => { if (!rows[s.row_num]) rows[s.row_num] = []; rows[s.row_num].push(s); });
      return Object.entries(rows).sort((a,b) => a[0]-b[0]);
    }

    function toggleSeat(btn) {
      const sid = btn.dataset.id;
      if (previewMode) {
        selectedSeats.clear();
        selectedSeats.set(sid, {
          id: sid, row: btn.dataset.row, seat: btn.dataset.seat,
          sector: btn.dataset.sector, price: btn.dataset.price,
        });
      } else if (selectedSeats.has(sid)) {
        selectedSeats.delete(sid);
      } else {
        selectedSeats.set(sid, {
          id: sid, row: btn.dataset.row, seat: btn.dataset.seat,
          sector: btn.dataset.sector, price: btn.dataset.price,
        });
      }
      render();
    }

    function updateSeatInfo() {
      const info = document.getElementById('seatInfo');
      if (!info) return;
      const seats = [...selectedSeats.values()];
      if (!seats.length) {
        info.classList.add('hidden');
        return;
      }
      info.classList.remove('hidden');
      if (previewMode) {
        const s = seats[0];
        info.innerHTML = `<p>Перегляд: ${s.sector}, ряд ${s.row}, місце ${s.seat} — ${formatPrice(s.price)}</p>`;
        return;
      }
      info.innerHTML = `
        <div class="selected-seats-header">
          <strong>Обрано: ${seats.length}</strong>
          <span class="price">${formatPrice(totalSelected())}</span>
        </div>
        <ul class="selected-seats-list">
          ${seats.map(s => `<li>${s.sector}, ряд ${s.row}, м. ${s.seat} — ${formatPrice(s.price)}</li>`).join('')}
        </ul>`;
      const btn = document.getElementById('addCartBtn');
      if (btn) btn.disabled = false;
    }

    async function addToCart() {
      if (!getToken()) { location.href = '/login.html?redirect=' + encodeURIComponent(location.href); return; }
      if (!selectedSeats.size || previewMode) return;
      try {
        const res = await api('/cart', {
          method: 'POST',
          body: JSON.stringify({ seat_ids: [...selectedSeats.keys()].map(Number) }),
        });
        toast(res.message || 'Додано в кошик', 'success');
        selectedSeats.clear();
        updateCartBadge();
        await fetchData();
        render();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function toggleFavorite() {
      try {
        if (isFavorite) {
          await api('/events/' + id + '/favorite', { method: 'DELETE' });
          isFavorite = false;
          toast('Видалено з обраного');
        } else {
          await api('/events/' + id + '/favorite', { method: 'POST' });
          isFavorite = true;
          toast('Додано в обране', 'success');
        }
        document.getElementById('favBtn').textContent = isFavorite ? 'В обраному' : 'В обране';
      } catch (e) { toast(e.message, 'error'); }
    }

    if (!id) {
      document.getElementById('content').innerHTML = '<div class="alert alert-error">Подію не вказано</div>';
    } else {
      fetchData().then(render).catch(e => {
        document.getElementById('content').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      });
    }
  </script>
</body>
</html>
