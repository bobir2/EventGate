<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід — EventGate</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header"></div>

  <div class="auth-box">
    <h2>Вхід</h2>
    <div id="alert"></div>
    <div class="form-group"><label>Email</label><input id="email" type="email"></div>
    <div class="form-group"><label>Пароль</label><input id="password" type="password"></div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">Увійти</button>
    <p style="text-align:center;margin-top:16px" class="meta">
      Немає акаунта? <a href="/register.html">Реєстрація</a>
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    async function login() {
      try {
        const data = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        setAuth(data.token, data.user);
        location.href = data.user.role === 'admin' ? '/admin.html' : '/profile.html';
      } catch (e) {
        document.getElementById('alert').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }
  </script>
</body>
</html>
